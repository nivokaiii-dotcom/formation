<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance en cours | Staff Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .maintenance-container {
            text-align: center;
            padding: 2rem;
            max-width: 500px;
            z-index: 1;
        }

        /* Animation de l'icône */
        .icon-box {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .status-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--accent);
            margin-bottom: 2rem;
            display: inline-block;
        }

        /* Barre de progression décorative */
        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--card);
            border-radius: 10px;
            margin-top: 2rem;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            width: 30%;
            height: 100%;
            background: var(--accent);
            position: absolute;
            animation: loading 3s infinite linear;
        }

        @keyframes loading {
            0% { left: -30%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="icon-box">
            <i class="bi bi-gear-fill"></i>
        </div>
        
        <br>
        <div class="status-badge">Maintenance Système</div>
        
        <h1>On revient très vite !</h1>
        
        <p id="message">Le Staff Panel subit actuellement une mise à jour pour améliorer vos outils d'administration. Merci de votre patience.</p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <p style="margin-top: 1.5rem; font-size: 0.9rem;">
            Prévu pour : <span id="time" style="color: var(--text-main);">Bientôt</span>
        </p>
    </div>

    <script>
        // Un petit script pour animer le message de chargement
        const messages = [
            "Optimisation de la base de données...",
            "Nettoyage des fichiers temporaires...",
            "Mise à jour des protocoles de sécurité...",
            "Presque terminé..."
        ];
        
        let i = 0;
        const msgElement = document.getElementById('time');

        setInterval(() => {
            msgElement.style.opacity = 0;
            setTimeout(() => {
                msgElement.textContent = messages[i];
                msgElement.style.opacity = 1;
                i = (i + 1) % messages.length;
            }, 500);
        }, 3000);
    </script>
</body>
</html>
